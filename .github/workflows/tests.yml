name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  phpunit:
    name: "PHP ${{ matrix.php }} / Laravel ${{ matrix.laravel }}"
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: ["8.2", "8.3", "8.4"]
        laravel: ["9.*", "10.*", "11.*"]
        exclude:
          - php: "8.4"
            laravel: "9.*"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none

      - name: Install dependencies
        run: |
          composer require "illuminate/http:${{ matrix.laravel }}" \
                           "illuminate/support:${{ matrix.laravel }}" \
                           "illuminate/log:${{ matrix.laravel }}" \
                           "illuminate/pagination:${{ matrix.laravel }}" \
                           "illuminate/validation:${{ matrix.laravel }}" \
                           --no-interaction --no-update
          composer update --prefer-dist --no-interaction

      - name: Run tests
        run: composer test
